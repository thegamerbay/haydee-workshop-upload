name: "haydee-workshop-upload"
description: "Caches tools, packs a Haydee mod to a .pack file and uploads it to the Steam Workshop"

branding:
  icon: upload
  color: orange

inputs:
  id:
    description: "Workshop item id (specify 0 if this is a new mod)"
    required: true
  folder:
    description: "Folder name(s) with prepared mod files (e.g. 'Outfits' or 'Outfits, Maps, Items' or 'Outfits Maps')"
    required: true
  pack_name:
    description: "Resulting file name (e.g. 'SynthwaveOutfit.pack')"
    required: true
  priority:
    description: "Package priority (base files have priority 1)"
    required: false
    default: "2"
  changelog:
    description: "Changelog"
    required: false
    default: "Automatic update via GitHub Actions"

runs:
  using: "composite"
  steps:
    # 1. Check cache for SteamCMD and game files
    - name: Cache SteamCMD and Haydee Tools
      id: cache-haydee
      uses: actions/cache@v5
      with:
        path: |
          ${{ runner.temp }}/steamcmd
          ${{ runner.temp }}/haydee_game
        key: haydee-tools-windows-v2

    # 2. Download SteamCMD (only if cache is not found)
    - name: Download SteamCMD
      if: steps.cache-haydee.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Write-Host "Cache not found. Downloading SteamCMD..."
        Invoke-WebRequest -Uri "https://steamcdn-a.akamaihd.net/client/installer/steamcmd.zip" -OutFile "$env:RUNNER_TEMP\steamcmd.zip"
        Expand-Archive -Path "$env:RUNNER_TEMP\steamcmd.zip" -DestinationPath "$env:RUNNER_TEMP\steamcmd" -Force

    - name: Bootstrap SteamCMD
      if: steps.cache-haydee.outputs.cache-hit != 'true'
      continue-on-error: true
      shell: pwsh
      run: |
        & "$env:RUNNER_TEMP\steamcmd\steamcmd.exe" +quit

    # 3. Install system dependencies (Added OpenAL)
    - name: Install System Dependencies for packer.exe
      shell: pwsh
      run: |
        Write-Host "Installing Visual C++ Redistributables, DirectX, and OpenAL via Chocolatey..."
        choco install vcredist-all directx openal -y --no-progress

    # 4. Download game to get packer.exe (only if cache is not found)
    - name: Download Haydee (Tools)
      if: steps.cache-haydee.outputs.cache-hit != 'true'
      shell: pwsh
      run: |
        Write-Host "Downloading Haydee game files..."
        & "$env:RUNNER_TEMP\steamcmd\steamcmd.exe" +force_install_dir "$env:RUNNER_TEMP\haydee_game" +login $env:STEAM_USERNAME $env:STEAM_PASSWORD +app_update 530890 validate +quit

    # 5. Pack folder(s) into .pack file (with protection against fake packer)
    - name: Run Haydee packer.exe
      shell: pwsh
      run: |
        Write-Host "Packing folder(s): ${{ inputs.folder }}"
        
        # Accurately find the correct Haydee packer.exe in the downloaded files
        $packerPath = Get-ChildItem -Path "$env:RUNNER_TEMP\haydee_game" -Filter "packer.exe" -Recurse | Select-Object -First 1
        if (-not $packerPath) {
            Write-Error "Haydee packer.exe not found!"
            exit 1
        }
        Write-Host "Found Haydee packer at: $($packerPath.FullName)"
        
        # Handle multiple folders by creating a unified staging directory
        $foldersInput = "${{ inputs.folder }}"
        $folders = $foldersInput -split '[,; ]+' | Where-Object { $_ -ne '' }
        
        $packTarget = "$env:GITHUB_WORKSPACE\${{ inputs.folder }}"
        $isMultiFolder = $folders.Count -gt 1
        
        if ($isMultiFolder) {
            Write-Host "Multiple folders detected. Creating temporary staging directory 'HaydeeWorkshopArchive'..."
            $stagingDir = "$env:RUNNER_TEMP\HaydeeWorkshopArchive"
            New-Item -ItemType Directory -Force -Path $stagingDir | Out-Null
            
            foreach ($f in $folders) {
                $sourcePath = "$env:GITHUB_WORKSPACE\$f"
                if (Test-Path $sourcePath) {
                    Write-Host "Copying $f to staging directory..."
                    Copy-Item -Path $sourcePath -Destination $stagingDir -Recurse -Force
                } else {
                    Write-Warning "Folder '$f' not found! Skipping..."
                }
            }
            $packTarget = $stagingDir
        }
        
        # Create a bat file to reliably pass the input stream to this specific utility
        $batContent = @"
        @echo off
        (
        echo ${{ inputs.pack_name }}
        echo ${{ inputs.priority }}
        ) | "$($packerPath.FullName)" "$packTarget"
        "@
        Set-Content -Path "$env:RUNNER_TEMP\run_packer.bat" -Value $batContent
        
        cmd.exe /c "$env:RUNNER_TEMP\run_packer.bat"
        $exitCode = $LASTEXITCODE
        
        # Cleanup staging directory if created
        if ($isMultiFolder -and (Test-Path $stagingDir)) {
            Write-Host "Cleaning up staging directory..."
            Remove-Item -Path $stagingDir -Recurse -Force
        }
        
        if ($exitCode -ne 0) { exit $exitCode }

    # 6. Prepare folder for Workshop submission
    - name: Prepare Workshop Content Folder
      shell: pwsh
      run: |
        New-Item -ItemType Directory -Force -Path "$env:RUNNER_TEMP\workshop_content"
        
        # Search for the created .pack file across the entire directory to avoid path errors
        $packPath = Get-ChildItem -Path . -Filter "${{ inputs.pack_name }}" -Recurse | Select-Object -First 1
        if ($packPath) {
            Move-Item -Path $packPath.FullName -Destination "$env:RUNNER_TEMP\workshop_content\" -Force
            Write-Host "Moved $($packPath.Name) to workshop_content."
        } else {
            Write-Error "Pack file ${{ inputs.pack_name }} not found!"
            exit 1
        }

    # 7. Generate workshop.vdf manifest
    - name: Create .vdf file
      shell: pwsh
      run: |
        $vdfContent = @"
        "workshopitem" {
          "appid" "530890"
          "publishedfileid" "${{ inputs.id }}"
          "contentfolder" "$((Get-Item "$env:RUNNER_TEMP\workshop_content").FullName)"
          "changenote" "${{ inputs.changelog }}"
        }
        "@
        Set-Content -Path "$env:RUNNER_TEMP\workshop.vdf" -Value $vdfContent

    # 8. Upload to Steam Workshop
    - name: Run SteamCMD to Upload
      shell: pwsh
      run: |
        Write-Host "Uploading to Steam Workshop..."
        & "$env:RUNNER_TEMP\steamcmd\steamcmd.exe" +login $env:STEAM_USERNAME $env:STEAM_PASSWORD +workshop_build_item "$((Get-Item "$env:RUNNER_TEMP\workshop.vdf").FullName)" +quit

    # 9. Print errors (if process fails)
    - name: Print Errors on Failure
      if: failure()
      shell: pwsh
      run: |
        if (Test-Path "$env:RUNNER_TEMP\steamcmd\logs\stderr.txt") { Get-Content "$env:RUNNER_TEMP\steamcmd\logs\stderr.txt" }
        if (Test-Path "$env:RUNNER_TEMP\steamcmd\logs\workshop_log.txt") { Get-Content "$env:RUNNER_TEMP\steamcmd\logs\workshop_log.txt" }
        exit 1
