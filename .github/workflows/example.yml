name: Deploy Synthwave Outfit

on:
  # To run automatically on version tags, uncomment the lines below:
  # push:
  #   tags:
  #     - 'v*'
  workflow_dispatch: # Allows manual trigger for testing

jobs:
  deploy:
    runs-on: windows-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v6

      - name: Upload Mod via haydee-workshop-upload
        uses: thegamerbay/haydee-workshop-upload@v1
        with:
          id: '3670764079'
          folder: 'Outfits'
          pack_name: 'SynthwaveOutfit.pack'
          priority: '2'
          changelog: 'Release ${{ github.ref_name }}'
        env:
          STEAM_USERNAME: ${{ secrets.STEAM_USERNAME }}
          STEAM_PASSWORD: ${{ secrets.STEAM_PASSWORD }}
